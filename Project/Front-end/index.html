<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AquaVisionAI</title>

  <!-- Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins',sans-serif;
    }

    body{
      background:linear-gradient(to bottom,#031b44,#04244d,#04224a);
      min-height:100vh;
      color:white;
      overflow-x:hidden;
    }

    /* NAVBAR */

    .navbar{
      width:100%;
      height:90px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:0 70px;
      background:#041838;
      border-bottom:1px solid rgba(255,255,255,0.05);
      position:sticky;
      top:0;
      z-index:100;
    }

    .logo{
      display:flex;
      align-items:center;
      gap:16px;
    }

    .logo-icon{
      width:42px;
      height:42px;
      border-radius:12px;
      display:flex;
      align-items:center;
      justify-content:center;
      color:#1dd6ff;
      font-size:24px;
    }

    .logo h1{
      font-size:28px;
      font-weight:700;
      letter-spacing:0.5px;
    }

    .nav-links{
      display:flex;
      align-items:center;
      gap:28px;
    }

    .nav-links a{
      text-decoration:none;
      color:#d8e6ff;
      font-size:22px;
      font-weight:500;
      display:flex;
      align-items:center;
      gap:10px;
      padding:14px 26px;
      border-radius:20px;
      transition:0.3s ease;
    }

    .nav-links a i{
      font-size:20px;
    }

    .nav-links a:hover{
      background:rgba(255,255,255,0.05);
      color:#1dd6ff;
    }

    .nav-links .active{
      background:#102a56;
      color:#1dd6ff;
      box-shadow:0 0 20px rgba(29,214,255,0.08);
    }

    /* HERO SECTION */

    .hero{
      width:100%;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      padding:60px 20px 80px;
      text-align:center;
    }

    .hero h2{
      font-size:68px;
      font-weight:800;
      line-height:1.1;
      margin-bottom:18px;
      letter-spacing:0.5px;
    }

    .hero p{
      font-size:26px;
      color:#9db4d8;
      margin-bottom:55px;
      font-weight:400;
    }

    /* UPLOAD BOX */

    .upload-container{
      width:780px;
      max-width:95%;
      min-height:520px;
      border:3px dashed rgba(255,255,255,0.15);
      border-radius:40px;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      background:linear-gradient(to bottom right,rgba(8,33,70,0.8),rgba(4,28,61,0.85));
      position:relative;
      overflow:hidden;
      transition:0.35s ease;
      cursor:pointer;
    }

    .upload-container:hover{
      border-color:rgba(29,214,255,0.45);
      transform:translateY(-4px);
      box-shadow:0 20px 50px rgba(0,0,0,0.35);
    }

    .upload-container::before{
      content:'';
      position:absolute;
      width:280px;
      height:280px;
      background:rgba(29,214,255,0.06);
      border-radius:50%;
      filter:blur(40px);
      top:-100px;
      right:-80px;
    }

    .upload-container::after{
      content:'';
      position:absolute;
      width:240px;
      height:240px;
      background:rgba(0,125,255,0.06);
      border-radius:50%;
      filter:blur(50px);
      bottom:-100px;
      left:-100px;
    }

    .upload-icon{
      width:130px;
      height:130px;
      border-radius:35px;
      background:linear-gradient(145deg,#0f4f80,#08395e);
      display:flex;
      align-items:center;
      justify-content:center;
      margin-bottom:40px;
      box-shadow:0 15px 35px rgba(0,0,0,0.25);
      z-index:2;
    }

    .upload-icon i{
      font-size:60px;
      color:#27dbff;
    }

    .upload-container h3{
      font-size:42px;
      font-weight:700;
      margin-bottom:16px;
      z-index:2;
    }

    .upload-container p{
      font-size:24px;
      color:#aac0de;
      z-index:2;
    }

    .upload-container p span{
      color:#17d6ff;
      text-decoration:underline;
      font-weight:600;
      cursor:pointer;
    }

    .upload-container input{
      display:none;
    }

    .supported-format{
      margin-top:35px;
      color:#6f88ad;
      font-size:17px;
      z-index:2;
    }

    /* RESPONSIVE */

    @media(max-width:1200px){

      .hero h2{
        font-size:56px;
      }

      .hero p{
        font-size:22px;
      }

      .upload-container{
        min-height:470px;
      }
    }

    @media(max-width:900px){

      .navbar{
        padding:0 25px;
        height:auto;
        flex-direction:column;
        gap:20px;
        padding-top:20px;
        padding-bottom:20px;
      }

      .nav-links{
        flex-wrap:wrap;
        justify-content:center;
      }

      .nav-links a{
        font-size:18px;
      }

      .hero h2{
        font-size:46px;
      }

      .hero p{
        font-size:20px;
      }

      .upload-container{
        min-height:430px;
        border-radius:30px;
      }

      .upload-container h3{
        font-size:32px;
      }

      .upload-container p{
        font-size:20px;
      }
    }

    @media(max-width:600px){

      .logo h1{
        font-size:24px;
      }

      .hero{
        padding-top:45px;
      }

      .hero h2{
        font-size:38px;
      }

      .hero p{
        font-size:18px;
      }

      .upload-container{
        min-height:390px;
        padding:20px;
      }

      .upload-icon{
        width:100px;
        height:100px;
      }

      .upload-icon i{
        font-size:44px;
      }

      .upload-container h3{
        font-size:28px;
      }

      .upload-container p{
        font-size:18px;
      }
    }

    /* =========================
   RESULT MODAL
========================= */

.result-modal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.65);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:9999;
  backdrop-filter:blur(6px);
}

.result-box{
  width:420px;
  max-width:90%;
  background:linear-gradient(to bottom,#072552,#041733);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:28px;
  padding:40px 30px;
  text-align:center;
  position:relative;
  animation:popup 0.35s ease;
  box-shadow:0 20px 60px rgba(0,0,0,0.4);
}

@keyframes popup{
  from{
    transform:scale(0.7);
    opacity:0;
  }
  to{
    transform:scale(1);
    opacity:1;
  }
}

.close-btn{
  position:absolute;
  top:18px;
  right:22px;
  font-size:32px;
  color:#b8d5ff;
  cursor:pointer;
  transition:0.3s;
}

.close-btn:hover{
  color:#19d7ff;
}

.result-icon{
  width:100px;
  height:100px;
  margin:auto;
  border-radius:25px;
  background:linear-gradient(145deg,#0f4f80,#08395e);
  display:flex;
  align-items:center;
  justify-content:center;
  margin-bottom:25px;
}

.result-icon i{
  font-size:45px;
  color:#22dcff;
}

.result-box h2{
  font-size:32px;
  margin-bottom:25px;
}

.result-content{
  margin-bottom:30px;
}

.result-content p{
  font-size:22px;
  margin:14px 0;
  color:#dcecff;
}

.result-content span{
  color:#20d7ff;
  font-weight:600;
}

#tryAgainBtn{
  background:#12cfff;
  border:none;
  color:#00152f;
  padding:14px 28px;
  border-radius:14px;
  font-size:18px;
  font-weight:700;
  cursor:pointer;
  transition:0.3s;
}

#tryAgainBtn:hover{
  transform:translateY(-2px);
  box-shadow:0 10px 20px rgba(18,207,255,0.3);
}

  </style>
</head>
<body>

  <!-- ========================================
     NAVBAR SECTION START
     Copy this navbar into every page
======================================== -->

  <nav class="navbar">

    <div class="logo">
      <div class="logo-icon">
        <i class="fa-solid fa-fish-fins"></i>
      </div>
      <h1>AquaVision AI</h1>
    </div>

    <div class="nav-links">
      <!-- IMPORTANT:
      Use class="active" ONLY for the current page.

      Example:
      index.html    -> Identify link active
      about.html    -> About link active
      discover.html -> Discover link active
      -->

      <a href="index.html" class="active">
        <i class="fa-solid fa-magnifying-glass"></i>
        Identify
      </a>

      <a href="discover.html">
        <i class="fa-solid fa-water"></i>
        Discover
      </a>

      <a href="about.html">
        <i class="fa-regular fa-circle-info"></i>
        About
      </a>

    </div>

  </nav>

<!-- ========================================
     NAVBAR SECTION END
======================================== -->

  <!-- ========================================
     HERO SECTION START
     Main landing section
======================================== -->

  <section class="hero">

    <h2>Identify Species</h2>

    <p>Capture or upload a photo of your fish</p>

    <!-- UPLOAD BOX -->

    <label class="upload-container">

      <input type="file" id="fileInput" accept="image/*">

      <div class="upload-icon">
        <i class="fa-solid fa-arrow-up-from-bracket"></i>
      </div>

      <h3>Ready to identify?</h3>

      <p>
        Drag your photo here or
        <span>browse files</span>
      </p>

      <div class="supported-format">
        Supported formats: JPG, PNG, WEBP
      </div>

    </label>

  </section>
<div class="result-modal" id="resultModal">

  <div class="result-box">

    <span class="close-btn" id="closeModal">&times;</span>

    <div class="result-icon">
      <i class="fa-solid fa-fish"></i>
    </div>

    <h2>Prediction Result</h2>

    <div class="result-content">

      <p>
        <strong>Fish:</strong>
        <span id="fishName">---</span>
      </p>

      <p>
        <strong>Confidence:</strong>
        <span id="fishConfidence">---</span>
      </p>

    </div>

    <button id="tryAgainBtn">
      Try Another Image
    </button>

  </div>

</div>

<script>

const fileInput = document.querySelector('input[type="file"]');

fileInput.addEventListener("change", async function () {

    const file = this.files[0];

    if (!file) return;

    // Create form data
    const formData = new FormData();

    formData.append("image", file);

    try {

        // Send image to Flask backend
        const response = await fetch(
            "http://127.0.0.1:5000/predict",
            {
                method: "POST",
                body: formData
            }
        );

        const data = await response.json();

        // Show result
        if (data.success) {

           document.getElementById("fishName").innerText =
            data.fish;

           document.getElementById("fishConfidence").innerText =
            data.confidence + "%";

           document.getElementById("resultModal").style.display =
            "flex";

        } else {

            alert(data.message);
        }

    } catch (error) {

        console.error(error);

        alert("Upload failed");
    }

});
// CLOSE MODAL

const resultModal =
    document.getElementById("resultModal");

const closeModal =
    document.getElementById("closeModal");

const tryAgainBtn =
    document.getElementById("tryAgainBtn");

closeModal.onclick = () => {

    resultModal.style.display = "none";

    fileInput.value = "";
};

tryAgainBtn.onclick = () => {

    resultModal.style.display = "none";

    fileInput.value = "";
};

// Close when clicking outside

window.onclick = (e) => {

    if (e.target === resultModal) {

        resultModal.style.display = "none";

        fileInput.value = "";
    }
};

</script>

     HERO SECTION END
======================================== -->
